openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admin
    description: Admin dashboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all bot users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: flagged
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /admin/users/{id}:
    get:
      operationId: getAdminUser
      tags: [admin]
      summary: Get single user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotUser"
    patch:
      operationId: patchAdminUser
      tags: [admin]
      summary: Update user (ban/flag/trust)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotUser"

  /admin/submissions:
    get:
      operationId: listAdminSubmissions
      tags: [admin]
      summary: List submissions
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionListResponse"

  /admin/submissions/{id}:
    patch:
      operationId: patchAdminSubmission
      tags: [admin]
      summary: Approve or reject a submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchSubmissionBody"
      responses:
        "200":
          description: Updated submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSubmission"

  /admin/campaigns:
    get:
      operationId: listAdminCampaigns
      tags: [admin]
      summary: List campaigns
      responses:
        "200":
          description: Campaign list
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaigns:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminCampaign"
                required: [campaigns]

  /admin/reddit-test:
    post:
      operationId: adminRedditTest
      tags: [admin]
      summary: Test a Reddit URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedditTestBody"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedditTestResult"

  /admin/console-logs:
    get:
      operationId: getConsoleLogs
      tags: [admin]
      summary: Get recent server logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleLogsResponse"

  /admin/set-password:
    post:
      operationId: adminSetPassword
      tags: [admin]
      summary: Set password for a client account (first login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPasswordBody"
      responses:
        "200":
          description: Password set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tasks:
    get:
      operationId: listAdminTasks
      tags: [admin]
      summary: List tasks
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    AdminLoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AdminLoginResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
      required: [id, username, role]

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        verifiedUsers:
          type: integer
        totalTasks:
          type: integer
        openTasks:
          type: integer
        pendingSubmissions:
          type: integer
        approvedSubmissions:
          type: integer
        totalEarned:
          type: string
        pendingPayout:
          type: string
        activeCampaigns:
          type: integer
        flaggedUsers:
          type: integer
      required:
        - totalUsers
        - verifiedUsers
        - totalTasks
        - openTasks
        - pendingSubmissions
        - approvedSubmissions
        - totalEarned
        - pendingPayout
        - activeCampaigns
        - flaggedUsers

    BotUser:
      type: object
      properties:
        id:
          type: integer
        discordId:
          type: string
        discordUsername:
          type: string
        redditUsername:
          type: string
          nullable: true
        verified:
          type: boolean
        trustScore:
          type: integer
        balanceAvailable:
          type: string
        balancePending:
          type: string
        totalEarned:
          type: string
        referralEarnings:
          type: string
        referralCode:
          type: string
          nullable: true
        isMod:
          type: boolean
        isAdmin:
          type: boolean
        flagged:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - discordId
        - discordUsername
        - verified
        - trustScore
        - balanceAvailable
        - balancePending
        - totalEarned
        - referralEarnings
        - isMod
        - isAdmin
        - flagged
        - createdAt

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/BotUser"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [users, total, page, limit]

    PatchUserBody:
      type: object
      properties:
        flagged:
          type: boolean
        isMod:
          type: boolean
        trustScore:
          type: integer

    AdminSubmission:
      type: object
      properties:
        id:
          type: integer
        claimId:
          type: integer
        taskId:
          type: integer
        userId:
          type: integer
        discordId:
          type: string
        discordUsername:
          type: string
          nullable: true
        proofLink:
          type: string
        reward:
          type: string
        reviewStatus:
          type: string
        reviewReason:
          type: string
          nullable: true
        submittedAt:
          type: string
        reviewedAt:
          type: string
          nullable: true
      required:
        - id
        - claimId
        - taskId
        - userId
        - discordId
        - proofLink
        - reward
        - reviewStatus
        - submittedAt

    SubmissionListResponse:
      type: object
      properties:
        submissions:
          type: array
          items:
            $ref: "#/components/schemas/AdminSubmission"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [submissions, total, page, limit]

    PatchSubmissionBody:
      type: object
      properties:
        reviewStatus:
          type: string
        reviewReason:
          type: string
      required: [reviewStatus]

    AdminCampaign:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        sourceType:
          type: string
        sourceUrl:
          type: string
          nullable: true
        totalTasks:
          type: integer
        tasksCreated:
          type: integer
        status:
          type: string
        createdAt:
          type: string
      required: [id, title, sourceType, totalTasks, tasksCreated, status, createdAt]

    AdminTask:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        reward:
          type: string
        maxSlots:
          type: integer
        slotsFilled:
          type: integer
        status:
          type: string
        createdAt:
          type: string
      required: [id, title, type, reward, maxSlots, slotsFilled, status, createdAt]

    TaskListResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/AdminTask"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [tasks, total, page, limit]

    RedditTestBody:
      type: object
      properties:
        url:
          type: string
        expectedAuthor:
          type: string
        expectedSubreddit:
          type: string
      required: [url]

    RedditTestResult:
      type: object
      properties:
        valid:
          type: boolean
        author:
          type: string
          nullable: true
        subreddit:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
      required: [valid]

    ConsoleLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            type: object
            properties:
              level:
                type: string
              message:
                type: string
              time:
                type: string
            required: [level, message, time]
      required: [logs]

    SetPasswordBody:
      type: object
      properties:
        username:
          type: string
        token:
          type: string
        newPassword:
          type: string
      required: [username, token, newPassword]
