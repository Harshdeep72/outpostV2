# Render Blueprint for Outpost Bot API server.
#
# If you already have a Render service for this app, you do NOT need to
# adopt this blueprint — but you DO need to update the existing service's
# Build Command in the Render dashboard to match `buildCommand` below.
# Render's older auto-detected command (`npm install -g pnpm ...`) fails
# with EROFS on Render's read-only /usr/lib. Corepack is the fix and
# ships with Node 20.

services:
  - type: web
    name: outpost-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    # We deliberately AVOID `npm install -g pnpm` and `corepack enable`
    # because both try to write to /usr/lib or /usr/bin which are read-only
    # on Render (EROFS). `npx --yes pnpm@9.15.0 ...` downloads pnpm into
    # the user-writable npm cache instead and works on every Render plan.
    # `--prod=false` is REQUIRED here. Render sets NODE_ENV=production which
    # makes pnpm skip devDependencies — but `esbuild` (used by build.mjs to
    # bundle the API server) lives in devDependencies. Without this flag the
    # build crashes with "Cannot find package 'esbuild'".
    buildCommand: |
      npx --yes pnpm@9.15.0 install --frozen-lockfile=false --prod=false
      npx --yes pnpm@9.15.0 run build:all
      python3 -m venv venv
      ./venv/bin/pip install --upgrade pip
      ./venv/bin/pip install curl_cffi
    startCommand: npx --yes pnpm@9.15.0 --filter @workspace/api-server run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      # PYTHON_PATH tells the bot exactly where the venv Python is on Render.
      # This avoids path-resolution failures when process.cwd() differs from
      # the workspace root at runtime. Adjust if your Render project path differs.
      - key: PYTHON_PATH
        value: /opt/render/project/src/venv/bin/python
      # The following must be set manually in the Render dashboard
      # (Settings → Environment) — they are NOT committed here:
      #   DATABASE_URL, SESSION_SECRET, DISCORD_TOKEN, DISCORD_CLIENT_ID,
      #   DISCORD_CLIENT_SECRET, DISCORD_GUILD_ID, ADMIN_*, etc.
      #
      # For reliable Reddit karma fetching, also set:
      #   REDDIT_SESSION_COOKIE — a valid Reddit session cookie (reddit_session=...
      #   or cookie header string). The Python curl_cffi client sends this with
      #   every request so Reddit's API allows the fetch even from datacenter IPs.
      #   Obtain from your browser's DevTools → Network → any reddit.com request →
      #   Copy the "Cookie" header value. Refresh periodically (every few weeks).

